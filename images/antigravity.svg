<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Vertical multicolor gradient matching Google Antigravity logo (Red/Orange top -> Green middle-left -> Blue bottom) -->
    <linearGradient id="ag_base_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DD5336"/>
      <stop offset="25%" stop-color="#E27329"/>
      <stop offset="55%" stop-color="#5588F2"/>
      <stop offset="100%" stop-color="#4C7DF3"/>
    </linearGradient>
    
    <!-- Soft green overlay for middle-left curve -->
    <radialGradient id="ag_green_mesh" cx="28%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#72C044" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#72C044" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Antigravity smooth arch path -->
  <path d="M 12 88
           C 5 88 8 76 18 61
           C 29 44 40 12 50 12
           C 60 12 71 44 82 61
           C 92 76 95 88 88 88
           C 80 88 74 77 66 65
           C 58 53 54 48 50 48
           C 46 48 42 53 34 65
           C 26 77 20 88 12 88 Z"
        fill="url(#ag_base_grad)"/>
        
  <path d="M 12 88
           C 5 88 8 76 18 61
           C 29 44 40 12 50 12
           C 60 12 71 44 82 61
           C 92 76 95 88 88 88
           C 80 88 74 77 66 65
           C 58 53 54 48 50 48
           C 46 48 42 53 34 65
           C 26 77 20 88 12 88 Z"
        fill="url(#ag_green_mesh)"/>
</svg>
